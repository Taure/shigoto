name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v2.0.9
    with:
      version-file: '.tool-versions'
      enable-ct: true
      enable-ex-doc: true
      enable-hank: true
      enable-audit: false
      enable-coverage: true
      enable-elp-lint: true
      enable-elp-eqwalize: true
      enable-sbom: true
      enable-sbom-scan: true
      enable-dependency-submission: true
      enable-summary: true
      extra-services-compose: 'docker-compose.ci.yml'

  release:
    needs: ci
    if: ${{ github.event_name == 'push' }}
    uses: Taure/erlang-ci/.github/workflows/release.yml@v2.0.9
    permissions:
      contents: write
